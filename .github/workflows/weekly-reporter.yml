name: 周度总结报告

on:
  schedule:
    - cron: "30 2 * * 6"
  workflow_dispatch:

jobs:
  weekly:
    runs-on: ubuntu-latest
    environment: STOCK_LIST
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 安装依赖
        run: pip install requests python-dotenv

      - name: 生成周度总结
        env:
          ANSPIRE_API_KEYS: ${{ secrets.ANSPIRE_API_KEYS }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVERS: ${{ secrets.EMAIL_RECEIVERS }}
        run: python scripts/weekly_reporter.py
