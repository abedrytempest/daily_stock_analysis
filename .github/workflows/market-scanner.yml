name: 市场深度扫描

on:
  schedule:
    - cron: "0 8 * * 1-5"
  workflow_dispatch:
    inputs:
      skip_llm:
        description: "跳过LLM分析"
        required: false
        default: false
        type: boolean

concurrency:
  group: market-scanner
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    environment: STOCK_LIST
    timeout-minutes: 25

    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install akshare pandas python-dotenv requests
          pip install yfinance exchange-calendars --quiet || true

      - name: 执行市场扫描
        env:
          ANSPIRE_API_KEYS: ${{ secrets.ANSPIRE_API_KEYS }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVERS: ${{ secrets.EMAIL_RECEIVERS }}
        run: |
          SKIP=""
          if [ "${{ github.event.inputs.skip_llm }}" = "true" ]; then
            SKIP="--skip-llm"
          fi
          python scripts/market_scanner.py --send-email $SKIP
